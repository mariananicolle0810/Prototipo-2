<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg, #92adee, #4a1f6b, #2d5ad6),
    radial-gradient(circle at top left, rgba(0,255,255,0.15), transparent 30%),
    radial-gradient(circle at bottom right, rgba(168,85,247,0.18), transparent 30%),
    linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
    color:white;
    padding:30px;
}

/* TITULO */
h1{
    font-size:55px;
    letter-spacing:2px;
    margin-bottom:15px;
    text-shadow:0 0 15px rgba(0,255,255,0.3);
}

/* LINEAS */
hr{
    border:none;
    height:1px;
    background:rgba(255,255,255,0.15);
    margin:20px 0;
}

/* NAV */
nav{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin:30px auto;
}

.top-menu,
.bottom-menu{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:white;
    padding:14px 24px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    transition:0.3s ease;
    font-weight:600;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

nav a:hover{
    transform:translateY(-4px);
    background:linear-gradient(135deg,#06b6d4,#8b5cf6);
    box-shadow:0 8px 25px rgba(0,255,255,0.25);
}

/* FORMULARIO */
.formulario{
    max-width:950px;
    margin:40px auto;
    padding:35px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);

    border-radius:30px;
    backdrop-filter:blur(12px);

    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* FILAS */
.fila{
    display:grid;
    grid-template-columns: 1fr 250px;
    align-items:center;
    gap:25px;

    margin-bottom:25px;
}

/* LABELS */
label{
    font-size:18px;
    color:#ffffff00;
    line-height:1.5;
}

/* NO MODIFICAR SELECT E INPUT */
select,
input{
    width:100%;
    box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

/* BOTON */
.boton{
    text-align:center;
    margin-top:35px;
}

button{
    padding:16px 32px;
    border:none;
    border-radius:18px;
    cursor:pointer;

    background:linear-gradient(135deg,#06b6d4,#8b5cf6);
    color:white;

    font-size:18px;
    font-weight:bold;

    transition:0.3s ease;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.3),
    0 0 20px rgba(139,92,246,0.3);
}

button:hover{
    transform:translateY(-3px) scale(1.02);
}

/* TITULO RESULTADOS */
h2{
    margin-top:60px;
    margin-bottom:25px;
    font-size:38px;
    color:#c4b5fd;
    text-shadow:0 0 12px rgba(168,85,247,0.3);
}

label{
    color: white;
}
/* RESULTADOS */
#res{
    display:block;
    max-width:950px;
    margin:20px auto;

    padding:30px;

    background:rgba(248, 246, 246, 0.958);
    border:1px solid rgba(255,255,255,0.12);

    border-radius:25px;
    backdrop-filter:blur(12px);

    line-height:1.8;
    font-size:17px;

    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    color: black;
}
.imagenes{
    display: flex;
    gap: 200px;
}
.imagen1{
    justify-content: left;
}
.imagen2{
    display: block;
    margin: auto;
}
.imagen3{
    margin-left: auto;
}
/* RESPONSIVE */
@media(max-width:768px){

    .fila{
        grid-template-columns:1fr;
    }

    nav a{
        width:100%;
        text-align:center;
    }

    button{
        width:100%;
    }

    h1{
        font-size:40px;
    }
}
label{
    text-align: justify;
}
</style>

<body>
        <h1 align="center">Neuro-Tracker</h1>
    <hr>
    <nav>

    <div class="top-menu">
        <a href="index.html">Inicio</a>
        <a href="evaluacion.html">Análisis de hábitos diarios</a>
    </div>

    <div class="bottom-menu">
        <a href="dietas.html">Dieta saludable</a>
        <a href="descanso.html">Mejor descanso</a>
        <a href="ejercicio.html">Rutinas de ejercicio</a>
    </div>

</nav>
<hr>
<br>
    <label>Ingrese los siguientes datos para poder hacer un análisis del efecto de sus hábitos diários en su cuerpo</label><br>
    <label>¿Cúanto tiempo paso viendo pantallas?</label><select name="pantalla">
                    <option>1-2 horas</option>
                    <option>3-5 horas</option>
                    <option>6-9 horas</option>
                    <option>10-12 horas</option>
                </select><br>
    <label>¿Realizó al menos 30 minutos de actividad física?</label><select name="ejercicio">
                    <option>Si</option>
                    <option>No</option>
                </select>

    <br>
    <label>Horas de sueño   </label><input type="number" name="horas"><br>
    <label>Nivel de estrés en el día    </label><select name="estres">
                    <option>Bajo</option>
                    <option>Medio</option>
                    <option>Alto</option>
                    <option>Muy alto</option>
                </select>
    <label>¿Has comido alguno de estos alimentos en el día: Huevo, productos lácteos, salmón, nueces y semillas, pavo?</label><select name="ali">
                    <option>Si</option>
                    <option>No</option>
                </select>
    <br>
    <br>
    <button onclick="analizar()">Analizar</button>
</form>
<h2 align="center">Recomendaciones</h2>
<label id="res"></label>
<hr>
<div class="imagenes">
<div class="imagen1"><img src="https://suizoamericano.edu.gt/wp-content/uploads/2025/03/Logo-CSA-1024x355.png" width="300"></div><div class="imagen2"><img src="https://github.com/mariananicolle0810/Prototipo-2/blob/main/WhatsApp%20Image%202026-05-14%20at%205.08.08%20PM.jpeg?raw=true" width="150"></div><div class="imagen3"><img src="https://moodle.suizoamericano.edu.gt/pluginfile.php/84286/mod_label/intro/logotipo%20superaccion%202026.jpeg" width="150"></div>
</div>
<script>
    function analizar(){
        var pantalla = document.querySelector('select[name="pantalla"]').selectedIndex;
        var ejercicio = document.querySelector('select[name="ejercicio"]').selectedIndex;
        var estres   = document.querySelector('select[name="estres"]').selectedIndex;
        var ali      = document.querySelector('select[name="ali"]').selectedIndex;
        var sueño=parseInt(document.getElementsByName("horas")[0].value);
        if (isNaN(sueño)){
            window.alert("Ingrese todos los datos solicitados para poder realizar la evaluación.")
        }else{
            recomendaciones=new Array()
            if (pantalla!=0){
                recomendaciones.push("•Tiempo frente a la pantalla: El tiempo frente a la pantalla aumentan los niveles de dopamina en el cuerpo que posteriormente pueden llevar a la adicción. El tiempo recomendable al día para los jóvenes es de 1 a 2 horas al día.")
            }else{
                recomendaciones.push("•Tiempo frente a la pantalla: Nivel aceptable.")
            }
            if (ejercicio!=0){
                recomendaciones.push("•Cantidad de actividad física: La actividad física favorece la producción de serotonina y otros neurotransmisores. Un mínimo de 30 minutos de actividad física el día hace una diferecia en tu estado emocional.")
            }else{
                recomendaciones.push("•Cantidad de actividad física: Nivel aceptable.")
            }
            if(sueño<7 ||sueño>9){
                recomendaciones.push("•Horas de sueño: Un sueño de calidad puede aumentar la producción de serotonina y dopamina. Las horas de sueño recomendadas son de 7 a 9 horas por día.")
            }else{
                recomendaciones.push("•Horas de sueño: Nivel aceptable.")
            }
            if (estres!=0 && estres!=1){
                recomendaciones.push("•Niveles de estrés: Los niveles de estrés alto puede reducir los niveles de serotonina y dopamina en el cuerpo. Practicar técnicas para la gestión del estrés cómo la meditación y yoga favorecen la gestión del estrés en su cuerpo.")
            }else{
                recomendaciones.push("•Niveles de estrés: Nivel aceptable.")
            }
            if (ali!=0){
                recomendaciones.push("•Alimentación: La alimentación es de fundamental para promover la producción de serotonina en el cuerpo. Es necesario consumir una dieta rica en proteínas como: pollo, pescado y legumbres; además de vitamina B, vegetales y magnesio.")
            }else{
                recomendaciones.push("•Alimentación: Aceptable.")
            }
            document.innerHTML="<h2>Recomendaciones</h2><br>"
            if (recomendaciones.length==0){
                document.getElementById("res").innerHTML="<label align='center'>Los datos ingresados cumplen con los hábitos saludables necesarios para favorecer su estado emocional. !Siga así!</label>"
            }else{
                respuesta=""
                for(i=0;i<recomendaciones.length;i++){
                    respuesta=respuesta+"<br>"+recomendaciones[i];
                }
                window.alert("Datos analizados")
                document.getElementById("res").innerHTML=respuesta
            }
        }
    }
</script>
