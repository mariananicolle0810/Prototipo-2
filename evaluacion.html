<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #581c87, #1e3a8a);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .hero h1 {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 22px;
            color: #d8b4fe;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            background: cyan;
            color: black;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .form-section {
            margin-top: 70px;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
        }

        input[type="range"], select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        .stress {
            display: flex;
            gap: 15px;
            font-size: 35px;
        }

        .analyze {
            text-align: center;
            margin-top: 40px;
        }

        .analyze button {
            padding: 18px 35px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(to right, cyan, violet);
            cursor: pointer;
            color: white;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 60px;
        }

        .result-box {
            padding: 30px;
            border-radius: 25px;
        }

        .green {
            background: rgba(0,255,120,0.15);
        }

        .yellow {
            background: rgba(255,255,0,0.15);
        }

        .bar {
            width: 100%;
            height: 18px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
        }

        .fill-green {
            width: 75%;
            height: 100%;
            background: limegreen;
        }

        .fill-yellow {
            width: 55%;
            height: 100%;
            background: gold;
        }

        .recommendations {
            margin-top: 70px;
        }

        .recommendations h2 {
            text-align: center;
            margin-bottom: 40px;
        }

        .recommendation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .recommendation {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            color: #ddd6fe;
        }
        nav{
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* FILA SUPERIOR */
.top-menu{
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* FILA INFERIOR */
.bottom-menu{
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

/* BOTONES */
nav a{
    padding: 14px 22px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-weight: bold;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.15);

    transition: 0.3s;
}

/* EFECTO HOVER */
nav a:hover{
    background: linear-gradient(135deg, cyan, violet);
    transform: translateY(-3px);
    box-shadow: 0 0 15px rgba(0,255,255,0.5);
}

/* CLICK */
nav a:active{
    transform: scale(0.95);
}
    </style>
